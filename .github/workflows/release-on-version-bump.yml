name: Trigger release on version bump

on:
  push:
    branches: [main]
    paths:
      - RELEASE.md

jobs:
  trigger:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Parse version and notes from RELEASE.md
        id: check
        run: |
          NEW=$(grep -m1 '^## v' RELEASE.md | sed 's/## v//')
          NOTES=$(awk '/^## v/{found++; if(found==1){next}} found==1{print}' RELEASE.md | sed '/^## v/,$d')
          OLD=$(git show HEAD^:RELEASE.md 2>/dev/null | grep -m1 '^## v' | sed 's/## v//' || echo "0.0.0")

          echo "new=$NEW"
          echo "old=$OLD"
          echo "new=$NEW"     >> "$GITHUB_OUTPUT"
          echo "old=$OLD"     >> "$GITHUB_OUTPUT"

          # Use heredoc to safely pass multiline notes
          {
            echo "notes<<EOF_NOTES"
            echo "$NOTES"
            echo "EOF_NOTES"
          } >> "$GITHUB_OUTPUT"

          if [ "$NEW" != "$OLD" ] && [ "$NEW" != "0.0.0" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged ($NEW) — skipping release trigger."
          fi

      - name: Dispatch release build to sheru repo
        if: steps.check.outputs.changed == 'true'
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          jq -n \
            --arg version "${{ steps.check.outputs.new }}" \
            --arg notes   "${{ steps.check.outputs.notes }}" \
            '{"event_type":"start-release","client_payload":{"version":$version,"notes":$notes}}' | \
          curl -sS -X POST \
            -H "Authorization: token $RELEASE_PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            -d @- \
            https://api.github.com/repos/AivionLabs/sheru/dispatches

          echo "Triggered release build for v${{ steps.check.outputs.new }}"
